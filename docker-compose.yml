services:
  zookeeper:
    image: wurstmeister/zookeeper:latest
    platform: linux/amd64
    ports:
      - '2181:2181'

  kafka:
    image: wurstmeister/kafka:2.11-1.1.1
    platform: linux/amd64
    ports:
      - '9092:9092'
    links:
      - zookeeper
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 9092 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command:
      - '--kafka.server=kafka:9092'
      - '--kafka.version=1.1.0'
    ports:
      - '9308:9308'
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: 'postgresql://${POSTGRES_DB_USER}:${POSTGRES_DB_PASSWORD}@postgres:5432/${POSTGRES_DB_NAME}?sslmode=disable'
    ports:
      - '9187:9187'
    depends_on:
      - postgres

  mongodb:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    command:
      - '--collect-all'
    environment:
      MONGODB_URI: 'mongodb://${MONGO_DB_USER}:${MONGO_DB_PASSWORD}@mongodb:27017/admin?authSource=admin'
    ports:
      - '9216:9216'
    depends_on:
      - mongodb

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    # love this feature
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

